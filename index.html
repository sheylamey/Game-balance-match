<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>balanced transport match</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ff9800;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }

        header {
            width: 90%;
            background: white;
            padding: 10px 20px;
            margin: 10px 0;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin: 0 0 5px 0; color: #333; font-size: 1.2rem; font-weight: normal; }

        #fuel-container {
            width: 100%;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ddd;
        }

        #fuel-bar {
            width: 100%;
            height: 100%;
            background: #4caf50;
            transition: width 0.1s linear;
        }

        #arena {
            position: relative;
            width: 95vw;
            max-width: 600px;
            height: 70vh;
            background-color: #81d4fa;
            border-radius: 20px;
            border: 5px solid white;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }

        #grass {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background-color: #4caf50;
        }

        .emoji {
            position: absolute;
            font-size: 3rem;
            cursor: grab;
            user-select: none;
            z-index: 10;
            transition: transform 0.1s;
        }

        .label {
            position: absolute;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            font-size: 1rem;
            color: #333;
            border: 2px dashed #03a9f4;
            pointer-events: none;
            user-select: none;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            color: white;
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #4caf50;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>balanced transport match</h1>
    <div id="fuel-container">
        <div id="fuel-bar"></div>
    </div>
</header>

<div id="arena">
    <div id="grass"></div>
</div>

<div id="overlay">
    <h2 id="status-text">game over</h2>
    <button onclick="resetGame()">play again</button>
</div>

<script>
    const data = [
        { e: '🚲', n: 'bike' }, { e: '🚌', n: 'bus' }, { e: '🚗', n: 'car' },
        { e: '🚇', n: 'metro' }, { e: '✈️', n: 'plane' }, { e: '🛵', n: 'scooter' },
        { e: '🚕', n: 'taxi' }, { e: '🚆', n: 'train' }, { e: '🚤', n: 'boat' },
        { e: '⛴️', n: 'ferry' }, { e: '🚚', n: 'truck' }, { e: '🏍️', n: 'motorcycle' },
        { e: '🚁', n: 'helicopter' }, { e: '🚠', n: 'cable car' }
    ];

    const arena = document.getElementById('arena');
    const fuelBar = document.getElementById('fuel-bar');
    const overlay = document.getElementById('overlay');
    const statusText = document.getElementById('status-text');

    let fuel = 100;
    let items = [];
    let labels = [];
    let audioCtx = null;
    let gameActive = true;

    // Audio Setup
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(freq, type, duration) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    class GameObject {
        constructor(data, isEmoji) {
            this.data = data;
            this.isEmoji = isEmoji;
            this.element = document.createElement('div');
            this.element.className = isEmoji ? 'emoji' : 'label';
            this.element.textContent = isEmoji ? data.e : data.n;
            
            this.x = Math.random() * (arena.clientWidth - 60);
            this.y = Math.random() * (arena.clientHeight - 80);
            this.vx = (Math.random() - 0.5) * 2;
            this.vy = (Math.random() - 0.5) * 2;
            
            arena.appendChild(this.element);
            
            if (isEmoji) {
                this.setupDrag();
            }
        }

        update() {
            if (this.dragging) return;
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 0 || this.x > arena.clientWidth - this.element.offsetWidth) this.vx *= -1;
            if (this.y < 0 || this.y > arena.clientHeight - this.element.offsetHeight - 40) this.vy *= -1;

            this.draw();
        }

        draw() {
            this.element.style.transform = `translate(${this.x}px, ${this.y}px)`;
        }

        setupDrag() {
            const start = (e) => {
                if (!gameActive) return;
                initAudio();
                this.dragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rect = arena.getBoundingClientRect();
                this.offsetX = (clientX - rect.left) - this.x;
                this.offsetY = (clientY - rect.top) - this.y;
                this.element.style.zIndex = 100;
            };

            const move = (e) => {
                if (!this.dragging) return;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const rect = arena.getBoundingClientRect();
                this.x = (clientX - rect.left) - this.offsetX;
                this.y = (clientY - rect.top) - this.offsetY;
                this.draw();
            };

            const end = () => {
                if (!this.dragging) return;
                this.dragging = false;
                this.element.style.zIndex = 10;
                checkMatch(this);
            };

            this.element.addEventListener('mousedown', start);
            this.element.addEventListener('touchstart', start);
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move);
            window.addEventListener('mouseup', end);
            window.addEventListener('touchend', end);
        }
    }

    function checkMatch(emojiObj) {
        let matched = false;
        labels.forEach((labelObj, index) => {
            const dist = Math.hypot(emojiObj.x - labelObj.x, emojiObj.y - labelObj.y);
            if (dist < 50) {
                if (emojiObj.data.n === labelObj.data.n) {
                    // Correct
                    playSound(600, 'sine', 0.2);
                    setTimeout(() => playSound(800, 'sine', 0.2), 100);
                    fuel = Math.min(100, fuel + 15);
                    emojiObj.element.remove();
                    labelObj.element.remove();
                    items = items.filter(i => i !== emojiObj);
                    labels = labels.filter(l => l !== labelObj);
                    matched = true;
                } else {
                    // Wrong
                    playSound(100, 'sawtooth', 0.3);
                }
            }
        });

        if (items.length === 0) endGame(true);
    }

    function gameLoop() {
        if (!gameActive) return;
        
        fuel -= 0.05;
        fuelBar.style.width = fuel + '%';
        
        if (fuel <= 0) endGame(false);

        items.forEach(i => i.update());
        labels.forEach(l => l.update());
        
        requestAnimationFrame(gameLoop);
    }

    function endGame(win) {
        gameActive = false;
        overlay.style.display = 'flex';
        statusText.textContent = win ? 'you win!' : 'out of fuel!';
    }

    function resetGame() {
        arena.querySelectorAll('.emoji, .label').forEach(e => e.remove());
        items = [];
        labels = [];
        fuel = 100;
        gameActive = true;
        overlay.style.display = 'none';

        data.forEach(d => {
            items.push(new GameObject(d, true));
            labels.push(new GameObject(d, false));
        });

        requestAnimationFrame(gameLoop);
    }

    resetGame();
</script>

</body>
</html>
